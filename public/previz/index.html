<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Pre-Viz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Xanh+Mono:ital@0;1&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./style.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <svg style="display: none;">
        <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></symbol>
        <symbol id="icon-play" viewBox="0 0 24 24"><path d="m5 3 14 9-14 9V3z"/></symbol>
        <symbol id="icon-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
        <symbol id="icon-eject" viewBox="0 0 24 24"><path d="M12 2 2 12h20L12 2zM2 20h20v2H2z"/></symbol>
    </svg>

    <div class="drag-overlay" id="drag-overlay">
        <div class="drag-message">
            <svg class="btn-icon" style="width: 48px; height: 48px;"><use href="#icon-upload"></use></svg>
            <div style="font-size: 24px; font-weight: bold;">Drop Video to Project</div>
            <div style="font-size: 14px; opacity: 0.7;">MP4 or WebM only</div>
        </div>
    </div>

    <div id="container"></div>

    <div class="ui-layer">
        <div class="top-bar">
            <div class="logo">PROJECTION PRE-VIZ <span class="version">v2.1</span></div>
            <div class="view-controls panel">
                <button id="btn-view-persp" class="pill active">Perspective</button>
                <button id="btn-view-ortho" class="pill">Orthographic</button>
                <div class="divider"></div>
                <button id="btn-view-front" class="pill">Front</button>
                <button id="btn-view-top" class="pill">Top</button>
                <button id="btn-view-side" class="pill">Side</button>
            </div>
        </div>

        <div class="bottom-area">
            <div class="nle-module sources-side">
                <div class="panel scroll-panel">
                    <div class="panel-header">PROJECTOR SOURCES</div>
                    <div class="source-grid">
                        <div class="source-card">
                            <div class="card-label">NORTH WALL</div>
                            <label class="upload-btn pill">
                                <span class="state-upload"><svg class="btn-icon"><use href="#icon-upload"></use></svg> Load Video</span>
                                <span class="state-eject"><svg class="btn-icon"><use href="#icon-eject"></use></svg> Eject</span>
                                <input type="file" id="upload-north" accept="video/mp4,video/webm">
                            </label>
                        </div>
                        <div class="source-card">
                            <div class="card-label">SOUTH WALL</div>
                            <label class="upload-btn pill">
                                <span class="state-upload"><svg class="btn-icon"><use href="#icon-upload"></use></svg> Load Video</span>
                                <span class="state-eject"><svg class="btn-icon"><use href="#icon-eject"></use></svg> Eject</span>
                                <input type="file" id="upload-south" accept="video/mp4,video/webm">
                            </label>
                        </div>
                        <div class="source-card">
                            <div class="card-label">EAST WALL</div>
                            <label class="upload-btn pill">
                                <span class="state-upload"><svg class="btn-icon"><use href="#icon-upload"></use></svg> Load Video</span>
                                <span class="state-eject"><svg class="btn-icon"><use href="#icon-eject"></use></svg> Eject</span>
                                <input type="file" id="upload-east" accept="video/mp4,video/webm">
                            </label>
                        </div>
                        <div class="source-card">
                            <div class="card-label">WEST WALL</div>
                            <label class="upload-btn pill">
                                <span class="state-upload"><svg class="btn-icon"><use href="#icon-upload"></use></svg> Load Video</span>
                                <span class="state-eject"><svg class="btn-icon"><use href="#icon-eject"></use></svg> Eject</span>
                                <input type="file" id="upload-west" accept="video/mp4,video/webm">
                            </label>
                        </div>
                        <button id="btn-save-scene" class="pill master-btn"><svg class="btn-icon"><use href="#icon-plus"></use></svg> Add to Seq</button>
                    </div>
                </div>
            </div>

            <div class="vertical-divider"></div>

            <div class="nle-module timeline-side">
                <div class="seq-controls-col">
                    <div id="timecode-display" class="pill timecode">00:00:00.00</div>
                    <button id="btn-seq-play" class="pill master-btn"><svg class="btn-icon icon-fill"><use href="#icon-play"></use></svg> Play Seq</button>
                </div>
                <div class="timeline-wrapper">
                    <div class="timeline-track" id="timeline-track"></div>
                    <div class="timeline-ruler" id="timeline-ruler" title="Click and drag here to scrub time">
                        <div class="ruler-notches"></div>
                    </div>
                    <div id="playhead"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
